version: "3.8"

# ═══════════════════════════════════════════════════════════
# JARVIS 1.5 — Docker Compose (Development)
# SYSTEMS™ · architectofscale.com
#
# Nur JARVIS-eigene Services.
# OpenClaw + N8N werden EXTERN installiert.
#
# Production: docker-compose.production.yml (vom Installer erstellt)
# Development: docker compose up -d
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────
  jarvis-db:
    image: postgres:16-alpine
    container_name: jarvis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jarvis}
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - jarvis-pg-data:/var/lib/postgresql/data
      - ./config/db/supabase_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./config/db/supabase_schema_v2.sql:/docker-entrypoint-initdb.d/02-schema-v2.sql:ro
      - ./config/db/supabase_schema_v3.sql:/docker-entrypoint-initdb.d/03-schema-v3.sql:ro
      - ./config/db/supabase_schema_v4_omi.sql:/docker-entrypoint-initdb.d/04-schema-v4-omi.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarvis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  jarvis-redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} --appendonly yes
    volumes:
      - jarvis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiteLLM (Model Router) ────────────────────────────
  jarvis-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: jarvis-litellm
    restart: unless-stopped
    command: --config /app/config/config.yaml
    env_file: .env
    volumes:
      - ./config/litellm:/app/config:ro
    depends_on:
      jarvis-db:
        condition: service_healthy
      jarvis-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"

  # ── JARVIS Core (Python Backend) ──────────────────────
  jarvis-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-core
    restart: unless-stopped
    env_file: .env
    environment:
      - LITELLM_URL=http://jarvis-litellm:4000
      - OLLAMA_API_BASE=http://jarvis-ollama:11434
    depends_on:
      jarvis-db:
        condition: service_healthy
      jarvis-litellm:
        condition: service_started

  # ── Mission Control Dashboard ─────────────────────────
  jarvis-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: jarvis-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OPENCLAW_URL=${OPENCLAW_URL:-http://host.docker.internal:8080}
      - N8N_URL=${N8N_URL:-http://host.docker.internal:5678}
      - LITELLM_URL=http://jarvis-litellm:4000
    depends_on:
      jarvis-db:
        condition: service_healthy
    ports:
      - "0.0.0.0:3000:3000"

  # ── Ollama (Lokale LLMs — 0 EUR) ─────────────────────
  jarvis-ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    volumes:
      - jarvis-ollama-data:/root/.ollama
    # GPU-Support (falls vorhanden):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama Model Init (pulls models on first start) ──
  jarvis-ollama-init:
    image: curlimages/curl:latest
    container_name: jarvis-ollama-init
    depends_on:
      jarvis-ollama:
        condition: service_healthy
    volumes:
      - ./scripts/ollama-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      - OLLAMA_HOST=http://jarvis-ollama:11434
    restart: "no"

volumes:
  jarvis-pg-data:
  jarvis-redis-data:
  jarvis-ollama-data:
