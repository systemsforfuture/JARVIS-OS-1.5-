# ═══════════════════════════════════════════════════════════
# JARVIS 1.5 — Nginx Reverse Proxy
# SYSTEMS™ · architectofscale.com
# ═══════════════════════════════════════════════════════════

upstream dashboard {
    server jarvis-dashboard:3000;
}

upstream litellm {
    server jarvis-litellm:4000;
}

upstream n8n {
    server jarvis-n8n:5678;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Dashboard (main UI)
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        proxy_pass http://dashboard/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket
    location /ws {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # LiteLLM (internal access only)
    location /litellm/ {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://litellm/;
        proxy_set_header Host $host;
    }

    # N8N (internal access only)
    location /n8n/ {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://n8n/;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"jarvis","version":"1.5.0"}';
        add_header Content-Type application/json;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }
}
